{% extends 'moodle_management/base.html' %}

{% block content %}
<h2>Delete Platform</h2>

<p>Are you sure you want to delete "{{ object.name }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'platform-list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
